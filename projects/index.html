<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../style/cont0.css" />
    <link rel="stylesheet" href="../style/topnav.css" />
    <link rel="stylesheet" href="../style/filter.css" />
    <link rel="stylesheet" href="../style/projects.css" />
    <link rel="stylesheet" href="../style/loading.css" />
    <link rel="stylesheet" href="../style/pagination.css" />
  </head>
  <body>
    <div class="nav-overlay" id="navOverlay"></div>
    <nav id="top-nav">
      <div class="nav-container">
        <div class="logo">JOVEN SANTOS</div>

        <button class="menu-toggle" id="menuOpen" aria-label="Open Menu">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <ul class="nav-links" id="navDrawer">
          <div class="drawer-top-container">
            <span class="in-drawer logo">SANTOS</span>
            <button class="menu-close" id="menuClose" aria-label="Close Menu">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <li><a href="/">HOME</a></li>
          <li><a href="#" class="active">PROJECTS</a></li>
          <li>
            <a href="/res/file/resume.pdf" target="_blank">
              RESUME
              <svg
                class="external-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                ></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
              </svg>
            </a>
          </li>
          <li>
            <a href="/contact"> CONTACT ME </a>
          </li>
        </ul>
      </div>
    </nav>
    <section id="filter">
      <div class="filter-container">
        <h2 class="section-title">Filter</h2>
        <div class="filter-section">
          <h4>Specialization</h4>
          <div class="filter-opt">
            <label
              ><input type="checkbox" class="cat-check" value="Front-end" />
              Front-end</label
            >
            <label
              ><input type="checkbox" class="cat-check" value="Back-end" />
              Back-end</label
            >
            <label
              ><input
                type="checkbox"
                class="cat-check"
                value="Quality Assurance"
              />
              QA</label
            >
          </div>
        </div>

        <div class="filter-section">
          <h4>Techstack</h4>
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              placeholder="Click or type to see skills..."
              autocomplete="off"
            />
            <div id="autocompleteList" class="autocomplete-items"></div>
          </div>
          <div id="tagContainer" class="tag-container"></div>
        </div>

        <button id="applyBtn">Apply Filters</button>
      </div>
    </section>
    <section id="featured-projects">
      <div id="projects-stacked-container"></div>
    </section>
    <div class="spacer"></div>
    <div class="spacer"></div>
    <script src="../script/topnav.js"></script>
    <script>
      let projectData = [];
      let availableTags = [];
      let currentChecks = [];
      let activeTags = [];
      let filteredProjects = [];
      let currentPage = 1;
      const projectsPerPage = 5;

      const searchInput = document.getElementById("searchInput");
      const tagContainer = document.getElementById("tagContainer");
      const applyBtn = document.getElementById("applyBtn");
      const list = document.getElementById("autocompleteList");
      const checkboxes = document.querySelectorAll(".cat-check");
      const container = document.getElementById("projects-stacked-container");

      // 1. projects
      async function loadProjects() {
        const url = "../data/projects.json";
        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Could not fetch projects: ${response.status}`);
          }
          projectData = await response.json();
          console.log("Project data loaded globally:", projectData);
          displayProjects(projectData);
        } catch (error) {
          console.error("Failed to load JSON:", error);
        }
      }
      loadProjects();
      //1. projects-end

      //2. tags
      async function loadTags() {
        const url = "../data/tags.json";
        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Could not fetch tags: ${response.status}`);
          }
          availableTags = await response.json();
          console.log("Tag data loaded globally:", availableTags);
        } catch (error) {
          console.error("Failed to load JSON:", error);
        }
      }
      loadTags();
      //2. tags-end

      //3. checkbox
      function updateActiveCheckboxes() {
        activeCheckbox = Array.from(checkboxes)
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => checkbox.value);
        currentChecks = activeCheckbox;
        console.log("Current active categories:", activeCheckbox);
      }
      checkboxes.forEach((checkbox) => {
        checkbox.addEventListener("change", updateActiveCheckboxes);
      });
      //3. checkbox-end

      //4. active-tags
      function showSuggestions() {
        const val = searchInput.value.toLowerCase();
        list.innerHTML = "";
        const matches = availableTags.filter(
          (t) => t.toLowerCase().includes(val) && !activeTags.includes(t),
        );

        if (matches.length > 0) {
          list.style.display = "block";
          matches.forEach((match) => {
            const div = document.createElement("div");
            div.textContent = match;
            div.onclick = () => addTag(match);
            list.appendChild(div);
          });
        } else {
          list.style.display = "none";
        }
      }

      searchInput.addEventListener("focus", showSuggestions);

      searchInput.addEventListener("input", showSuggestions);

      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const firstMatch = list.querySelector("div");
          if (firstMatch) firstMatch.click();
        }
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrapper")) {
          list.style.display = "none";
        }
      });

      function addTag(tag) {
        activeTags.push(tag);
        renderTags();
        searchInput.value = "";
        list.innerHTML = "";
        list.style.display = "none";
      }

      function renderTags() {
        tagContainer.innerHTML = activeTags
          .map(
            (t) => `
          <span class="tag">${t}
              <svg onclick="removeTag('${t}')" viewBox="0 0 24 24" width="12" height="12"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </span>
      `,
          )
          .join("");
      }

      window.removeTag = (tag) => {
        activeTags = activeTags.filter((t) => t !== tag);
        renderTags();
      };

      //4.active-tags-end

      //5. filtered-projects

      function updateFilteredProjects() {
        filteredProjects = projectData.filter((project) => {
          const matchesChecks =
            currentChecks.length === 0 ||
            currentChecks.every((role) => project.checkbox.includes(role));

          const matchesTags =
            activeTags.length === 0 ||
            activeTags.every((tag) => project.tags.includes(tag));

          return matchesChecks && matchesTags;
        });

        console.log("Global filteredProjects updated:", filteredProjects);
      }
      //5. filtered-projects-end

      //6. display-projects
      function displayProjects(dproject) {
        const container = document.getElementById("projects-stacked-container");

        // Calculate Start and End indices
        const startIndex = (currentPage - 1) * projectsPerPage;
        const endIndex = startIndex + projectsPerPage;
        const paginatedProjects = dproject.slice(startIndex, endIndex);

        container.classList.remove("visible");
        container.innerHTML = `
    <div class="loader-wrapper">
      <svg class="spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
      </svg>
    </div>
  `;

        setTimeout(() => {
          container.innerHTML = "";

          if (dproject.length === 0) {
            const fallback = document.createElement("div");
            fallback.classList.add("no-results");
            fallback.textContent = "No matching results found.";
            container.appendChild(fallback);
          } else {
            // Loop through the SLICED array only
            paginatedProjects.forEach((project) => {
              const newContainer = document.createElement("div");
              newContainer.classList.add("carousel-content");
              newContainer.innerHTML = `
          <img src="${project.image}" alt="${project.title}" />
          <div class="content-description">
            <div class="prj-title"><a href="${project.case_study_link}">${project.title}</a></div>
            <div class="prj-btns">
              <a href="${project.case_study_link}" class="prj-read">Read Case Study</a>
              <a href="${project.live_project_link}" class="prj-live">View Live Project<svg
                  class="external-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                  ></path>
                  <polyline points="15 3 21 3 21 9"></polyline>
                  <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg></a>
            </div>
            <div class="prj-tags">
              ${project.checkbox.map((item) => `<span class="prj-cycle">${item}</span>`).join("")}
              ${project.tags.map((tag) => `<span class="prj-tech">${tag}</span>`).join("")}
            </div>
            <div class="prj-desc">${project.Description}</div>
            <button class="prj-more">Show more</button>
          </div>
        `;

              const desc = newContainer.querySelector(".content-description");
              if (desc) {
                desc.style.height = "250px";
                void desc.offsetHeight;
              }
              container.appendChild(newContainer);
            });

            // After projects are added, add the pagination controls
            renderPagination(dproject.length, container, dproject);
          }

          container.classList.add("visible");
        }, 600);
      }
      //6. display-projects-end
      function renderPagination(totalItems, container, fullData) {
        const totalPages = Math.ceil(totalItems / projectsPerPage);
        if (totalPages <= 1) return;

        const nav = document.createElement("div");
        nav.className = "pagination-nav";

        const maxVisible = 2; // How many pages to show on either side of active page

        for (let i = 1; i <= totalPages; i++) {
          // Logic: Always show first, last, and the pages immediately around current
          if (
            i === 1 ||
            i === totalPages ||
            (i >= currentPage - maxVisible && i <= currentPage + maxVisible)
          ) {
            const btn = document.createElement("button");
            btn.textContent = i;
            btn.className = i === currentPage ? "page-btn active" : "page-btn";

            btn.addEventListener("click", () => {
              currentPage = i;
              displayProjects(fullData);
              window.scrollTo({
                top: container.offsetTop - 100,
                behavior: "smooth",
              });
            });

            nav.appendChild(btn);
          }
          // Add dots if there is a gap
          else if (
            i === currentPage - maxVisible - 1 ||
            i === currentPage + maxVisible + 1
          ) {
            const dots = document.createElement("span");
            dots.textContent = "...";
            dots.className = "pagination-dots";
            nav.appendChild(dots);
          }
        }
        container.appendChild(nav);
      }

      //7. filtered-projects display
      applyBtn.addEventListener("click", () => {
        updateFilteredProjects();
        currentPage = 1;

        displayProjects(filteredProjects);
      });
      //7. filtered-projects display-end
    </script>

    <script src="../script/prj-more.js"></script>
  </body>
</html>
